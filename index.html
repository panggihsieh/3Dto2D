<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>3D to 2D SVG Tools</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #1d2329;
        --muted: #687380;
        --line: #d9dee5;
        --panel: #ffffff;
        --canvas: #f4f6f8;
        --accent: #0b6bcb;
        --highlight: #050505;
        --highlight-text: #ff8a00;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        background: var(--canvas);
        font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      }

      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .home {
        width: min(1180px, 100%);
      }

      header {
        margin-bottom: 22px;
      }

      .highlight-title,
      .highlight-heading {
        display: inline-block;
        color: var(--highlight-text);
        background: var(--highlight);
        box-shadow: 0 2px 8px rgb(0 0 0 / 0.28);
        font-weight: 800;
        line-height: 1.05;
        letter-spacing: 0;
      }

      .highlight-title {
        padding: 12px 22px;
        font-size: clamp(2.2rem, 6vw, 4.4rem);
      }

      .options {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 18px;
      }

      .option {
        display: grid;
        min-height: 260px;
        padding: 24px;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: inherit;
        background: var(--panel);
        text-decoration: none;
      }

      .option:hover,
      .option:focus-visible {
        border-color: var(--accent);
        outline: none;
      }

      .highlight-heading {
        padding: 8px 12px;
        font-size: clamp(1.5rem, 3.2vw, 2.35rem);
      }

      .option p {
        margin: 22px 0 0;
        color: var(--muted);
        font-size: 1.05rem;
        line-height: 1.6;
      }

      .launch {
        align-self: end;
        margin-top: 30px;
        color: var(--accent);
        font-size: 1.05rem;
        font-weight: 700;
      }

      @media (max-width: 760px) {
        main {
          padding: 16px;
        }

        .options {
          grid-template-columns: 1fr;
        }

        .highlight-title {
          font-size: clamp(2rem, 12vw, 3.2rem);
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="home" aria-labelledby="homeTitle">
        <header>
          <h1 id="homeTitle" class="highlight-title">3D幾何圖 轉 2D展開圖 操作練習</h1>
        </header>

        <div class="options">
          <a class="option" href="basic/">
            <div>
              <h2 class="highlight-heading">基本幾何形狀切割展開練習</h2>
              <p>沒有接榫功能。適合只需要把內建幾何展開成 SVG/DXF 切割輪廓。</p>
            </div>
            <span class="launch">開啟基本模式</span>
          </a>

          <a class="option" href="v2/">
            <div>
              <h2 class="highlight-heading">3D展開平面圖 接榫練習</h2>
              <p>純粹接榫功能。上傳 SVG，選取一對邊，產生 f/F 互補接榫輪廓。</p>
            </div>
            <span class="launch">開啟接榫模式</span>
          </a>
        </div>
      </section>
    </main>
  </body>
</html>
