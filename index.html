<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>3D to 2D SVG Tools</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #1d2329;
        --muted: #687380;
        --line: #d9dee5;
        --panel: #ffffff;
        --canvas: #f4f6f8;
        --accent: #0b6bcb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        background: var(--canvas);
        font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      }

      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .home {
        width: min(920px, 100%);
      }

      header {
        margin-bottom: 20px;
      }

      .eyebrow {
        margin: 0 0 6px;
        color: var(--muted);
        font-size: 0.78rem;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 5vw, 3.5rem);
        line-height: 1;
      }

      .subtitle {
        margin: 12px 0 0;
        color: var(--muted);
        font-size: 1rem;
      }

      .options {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }

      .option {
        display: grid;
        min-height: 230px;
        padding: 22px;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: inherit;
        background: var(--panel);
        text-decoration: none;
      }

      .option:hover,
      .option:focus-visible {
        border-color: var(--accent);
        outline: none;
      }

      .option h2 {
        margin: 0;
        font-size: 1.25rem;
      }

      .option p {
        margin: 10px 0 0;
        color: var(--muted);
      }

      .launch {
        align-self: end;
        margin-top: 28px;
        color: var(--accent);
        font-weight: 700;
      }

      @media (max-width: 720px) {
        .options {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="home" aria-labelledby="homeTitle">
        <header>
          <p class="eyebrow">3D to 2D SVG tools</p>
          <h1 id="homeTitle">選擇工作模式</h1>
          <p class="subtitle">依照是否需要接榫，進入不同工具頁。</p>
        </header>

        <div class="options">
          <a class="option" href="basic/">
            <div>
              <h2>基本切割展開</h2>
              <p>沒有接榫功能。適合只需要把內建幾何展開成 SVG/DXF 切割輪廓。</p>
            </div>
            <span class="launch">開啟基本模式</span>
          </a>

          <a class="option" href="v2/">
            <div>
              <h2>SVG 接榫選邊</h2>
              <p>純粹接榫功能。上傳 SVG，選取一對邊，產生 f/F 互補接榫輪廓。</p>
            </div>
            <span class="launch">開啟接榫模式</span>
          </a>
        </div>
      </section>
    </main>
  </body>
</html>
