<!doctype html>
<html lang="zh-Hant" class="notranslate" translate="no">
  <head>
    <meta charset="utf-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>3D to 2D SVG Tools</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #ecf3f8;
        --muted: #9fb0bd;
        --line: #263642;
        --panel: #101820;
        --panel-strong: #0b1116;
        --canvas: #151d25;
        --steam-blue: #66c0f4;
        --steam-glow: 0 0 8px rgba(102, 192, 244, 0.3);
        --orange: #ff8a00;
        --orange-soft: #ffb24a;
        --black: #050505;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        background:
          radial-gradient(circle at 18% 12%, rgba(102, 192, 244, 0.14), transparent 28rem),
          linear-gradient(135deg, #101820 0%, #172531 46%, #0b1116 100%);
        font-family: "Trebuchet MS", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      }

      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 28px;
      }

      .home {
        width: min(1180px, 100%);
      }

      .credit {
        position: fixed;
        right: 16px;
        bottom: 12px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.4;
        text-decoration: none;
      }

      .credit:hover,
      .credit:focus-visible {
        color: var(--steam-blue);
        text-decoration: underline;
      }

      header {
        margin-bottom: 22px;
        text-align: center;
      }

      .language-switcher {
        position: fixed;
        top: 16px;
        right: 16px;
        z-index: 10;
      }

      .language-switcher label {
        display: block;
      }

      .language-switcher span {
        position: absolute;
        inline-size: 1px;
        block-size: 1px;
        overflow: hidden;
        clip: rect(0 0 0 0);
        white-space: nowrap;
      }

      .language-switcher select {
        min-height: 40px;
        border: 1px solid rgba(255, 138, 0, 0.65);
        border-radius: 6px;
        padding: 8px 36px 8px 12px;
        color: var(--orange);
        background:
          linear-gradient(45deg, transparent 50%, var(--orange) 50%),
          linear-gradient(135deg, var(--orange) 50%, transparent 50%),
          var(--black);
        background-position:
          calc(100% - 17px) 17px,
          calc(100% - 12px) 17px,
          100% 0;
        background-repeat: no-repeat;
        background-size: 5px 5px, 5px 5px, 2.5rem 100%;
        box-shadow: 0 0 16px rgba(255, 138, 0, 0.18);
        font: inherit;
        font-size: 0.9rem;
        font-weight: 800;
        appearance: none;
      }

      .language-switcher select:focus-visible {
        border-color: var(--orange-soft);
        outline: 2px solid var(--steam-blue);
        outline-offset: 2px;
      }

      /* High-contrast workshop labels requested for the landing page. */
      .highlight-title,
      .highlight-heading {
        display: inline-block;
        color: var(--orange);
        background: var(--black);
        border: 1px solid rgba(255, 138, 0, 0.55);
        box-shadow: 0 0 16px rgba(255, 138, 0, 0.24);
        font-weight: 800;
        line-height: 1.05;
        letter-spacing: 0;
      }

      .highlight-title {
        padding: 12px 22px;
        font-size: clamp(2.2rem, 6vw, 4.4rem);
      }

      .workbench {
        display: grid;
        gap: 18px;
      }

      .options {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 18px;
      }

      .option,
      .control-panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(16, 24, 32, 0.94);
        transition:
          border-color 180ms ease,
          box-shadow 180ms ease,
          transform 180ms ease;
      }

      .option {
        display: grid;
        min-height: 250px;
        padding: 24px;
        color: inherit;
        text-decoration: none;
      }

      /* Steam-blue micro-interaction for cards. */
      .option:hover,
      .option:focus-visible,
      .control-panel:hover {
        border-color: var(--steam-blue);
        box-shadow: var(--steam-glow);
      }

      .option:hover,
      .option:focus-visible {
        transform: translateY(-2px);
        outline: none;
      }

      .highlight-heading {
        padding: 8px 12px;
        font-size: clamp(1.45rem, 3vw, 2.2rem);
      }

      .option p,
      .control-panel p {
        margin: 22px 0 0;
        color: var(--muted);
        font-size: 1.02rem;
        line-height: 1.6;
      }

      .option p + p {
        margin-top: 10px;
      }

      .option .note-line {
        color: var(--orange-soft);
        font-weight: 800;
      }

      .btn-steam {
        align-self: end;
        justify-self: center;
        display: inline-flex;
        align-items: center;
        min-height: 58px;
        margin-top: 30px;
        padding: 10px 28px;
        border: 1px solid rgba(255, 138, 0, 0.72);
        border-radius: 6px;
        color: var(--orange);
        background: var(--black);
        box-shadow:
          0 0 16px rgba(255, 138, 0, 0.22),
          inset 0 1px 0 rgba(255, 255, 255, 0.08);
        font-size: clamp(1.45rem, 2.6vw, 2.15rem);
        font-weight: 800;
        transition:
          transform 90ms ease,
          border-color 180ms ease,
          box-shadow 180ms ease;
      }

      .btn-steam:hover,
      .btn-steam:focus-visible {
        border-color: var(--orange-soft);
        box-shadow:
          0 0 20px rgba(255, 138, 0, 0.3),
          inset 0 1px 0 rgba(255, 255, 255, 0.12);
      }

      /* Active-state click feedback requested for launch buttons. */
      .btn-steam:active {
        transform: scale(0.98);
      }

      .control-panel {
        padding: 14px 16px;
      }

      .panel-title {
        margin: 0;
        color: var(--orange-soft);
        font-size: 1rem;
        font-weight: 800;
      }

      .field-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        margin-top: 10px;
      }

      label {
        display: grid;
        gap: 5px;
        color: var(--muted);
        font-size: 0.78rem;
      }

      input {
        width: 100%;
        min-height: 38px;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 8px 9px;
        color: var(--ink);
        background: #0d141b;
        transition:
          border-color 180ms ease,
          box-shadow 180ms ease,
          background-color 180ms ease;
      }

      /* Steam-blue micro-interaction for input boxes. */
      input:hover,
      input:focus {
        border-color: var(--steam-blue);
        box-shadow: var(--steam-glow);
        background: #0f1a23;
        outline: none;
      }

      @media (max-width: 980px) {
        .options,
        .field-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 620px) {
        main {
          padding: 16px;
        }

        .highlight-title {
          font-size: clamp(1.9rem, 11vw, 3.1rem);
        }

        .credit {
          right: 12px;
          bottom: 10px;
        }

        .language-switcher {
          position: static;
          justify-self: end;
          width: min(210px, 100%);
          margin: 0 0 14px auto;
        }

        .language-switcher select {
          width: 100%;
        }

        .options,
        .field-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="language-switcher">
      <label>
        <span data-i18n="languageLabel">語言</span>
        <select id="languageSelect" aria-label="語言">
          <option value="zh-Hant">中文</option>
          <option value="en">English</option>
        </select>
      </label>
    </div>
    <main>
      <section class="home" aria-labelledby="homeTitle">
        <header>
          <h1 id="homeTitle" class="highlight-title" data-i18n="homeTitle">雷雕實驗室</h1>
        </header>

        <div class="workbench">
          <div class="options">
            <a class="option" href="demo/" target="_blank" rel="noopener">
              <div>
                <p data-i18n="basicDescription">可切換沒有接榫與接榫後兩種狀態，適合檢視內建幾何展開後的凹凸契合。</p>
              </div>
              <span class="btn-steam" data-i18n="basicButton">接榫展示區</span>
            </a>

            <a class="option" href="interlock/" target="_blank" rel="noopener">
              <div>
                <p data-i18n="jointDescription">提供內尺寸接榫操作練習。上傳 SVG後選取一對邊，產生 f(凸)/F(凹) 互補接榫輪廓。提高精確度，建議前往 boxes.py 網站下載。</p>
              </div>
              <span class="btn-steam" data-i18n="jointButton">接榫製作區</span>
            </a>

            <a class="option" href="bmptrace/" target="_blank" rel="noopener">
              <div>
                <p class="note-line" data-i18n="bmptraceNote">本地需安裝 Potrace 開源軟體。</p>
                <p data-i18n="bmptraceDescription">將圖片轉成灰階分層 SVG，搭配 FLUX / Beam Studio 做漸層雕刻測試與功率表輸出。</p>
              </div>
              <span class="btn-steam" data-i18n="bmptraceButton">漸層一鍵生</span>
            </a>

            <a class="option" href="svglayers/" target="_blank" rel="noopener">
              <div>
                <p data-i18n="svglayersDescription">上傳 SVG 後檢視圖層名稱、切換圖層顯示，並用縮放功能確認向量細節。</p>
              </div>
              <span class="btn-steam" data-i18n="svglayersButton">漸層檢視區</span>
            </a>
          </div>

          <section class="control-panel" aria-label="工程資料預覽" data-i18n-aria-label="controlAria">
            <h2 class="panel-title" data-i18n="controlTitle">練習參數快照</h2>
            <p data-i18n="controlDescription">快速預覽材料與接榫參數，實際輸出仍在各工具頁面中調整。</p>
            <div class="field-grid">
              <label>
                <span data-i18n="materialThickness">材料厚度 mm</span>
                <input type="text" value="3.0" aria-label="材料厚度 mm" data-i18n-aria-label="materialThickness">
              </label>
              <label>
                <span data-i18n="kerf">Kerf mm</span>
                <input type="text" value="0.15" aria-label="Kerf mm">
              </label>
              <label>
                <span data-i18n="tabWidth">接榫寬度 mm</span>
                <input type="text" value="10" aria-label="接榫寬度 mm" data-i18n-aria-label="tabWidth">
              </label>
              <label>
                <span data-i18n="tabDepth">接榫深度 mm</span>
                <input type="text" value="3" aria-label="接榫深度 mm" data-i18n-aria-label="tabDepth">
              </label>
            </div>
          </section>
        </div>
      </section>
      <a class="credit" href="https://www.youtube.com/watch?v=ajS14K2Bd28&amp;list=PLOpaxws6B-0QGvgA3LF9dzdTRRb6PtHp7" target="_blank" rel="noopener">@大南國小 邦基老師</a>
    </main>
    <script>
      const translations = {
        "zh-Hant": {
          documentTitle: "3D to 2D SVG Tools",
          languageLabel: "語言",
          controlAria: "工程資料預覽",
          homeTitle: "雷雕實驗室",
          basicDescription: "可切換沒有接榫與接榫後兩種狀態，適合檢視內建幾何展開後的凹凸契合。",
          basicButton: "接榫展示區",
          jointDescription: "提供內尺寸接榫操作練習。上傳 SVG後選取一對邊，產生 f(凸)/F(凹) 互補接榫輪廓。提高精確度，建議前往 boxes.py 網站下載。",
          jointButton: "接榫製作區",
          bmptraceNote: "本地需安裝 Potrace 開源軟體。",
          bmptraceDescription: "將圖片轉成灰階分層 SVG，搭配 FLUX / Beam Studio 做漸層雕刻測試與功率表輸出。",
          bmptraceButton: "漸層一鍵生",
          svglayersDescription: "上傳 SVG 後檢視圖層名稱、切換圖層顯示，並用縮放功能確認向量細節。",
          svglayersButton: "漸層檢視區",
          controlTitle: "練習參數快照",
          controlDescription: "快速預覽材料與接榫參數，實際輸出仍在各工具頁面中調整。",
          materialThickness: "材料厚度 mm",
          kerf: "Kerf mm",
          tabWidth: "接榫寬度 mm",
          tabDepth: "接榫深度 mm"
        },
        en: {
          documentTitle: "3D to 2D SVG Tools",
          languageLabel: "Language",
          controlAria: "Engineering data preview",
          homeTitle: "Laser Lab",
          basicDescription: "Switch between plain and joined states to inspect how the built-in unfolded geometry fits together.",
          basicButton: "Joinery Demo",
          jointDescription: "An inner-dimension SVG joinery tool. Upload or load an unfolded drawing, keep black lines as protected inner dimensions, use gray material-thickness offset references, and generate orthogonal matching f/F joints from paired edges.",
          jointButton: "Joinery Builder",
          bmptraceNote: "Potrace open-source software must be installed locally.",
          bmptraceDescription: "Convert images into grayscale layered SVGs for FLUX / Beam Studio gradient engraving tests and power tables.",
          bmptraceButton: "Gradient Maker",
          svglayersDescription: "Upload an SVG to inspect layer names, toggle layer visibility, and zoom in to check vector details.",
          svglayersButton: "Layer Inspector",
          controlTitle: "Practice Parameter Snapshot",
          controlDescription: "Preview material and joinery parameters quickly; final output is still adjusted inside each tool page.",
          materialThickness: "Material thickness mm",
          kerf: "Kerf mm",
          tabWidth: "Tab width mm",
          tabDepth: "Tab depth mm"
        },
        de: {
          documentTitle: "3D-zu-2D-SVG-Werkzeuge",
          languageLabel: "Sprache",
          controlAria: "Vorschau der technischen Daten",
          homeTitle: "Laserlabor",
          basicDescription: "Wechseln Sie zwischen Zustand ohne und mit Zapfen, um die Passung der integrierten Abwicklung zu prüfen.",
          basicButton: "Zapfen-Demo",
          jointDescription: "Ein SVG-Zapfenwerkzeug für Innenmaße. Laden Sie eine Abwicklung hoch, behalten Sie schwarze Linien als Innenmaß und erzeugen Sie mit grauen Materialstärke-Referenzen rechtwinklige passende f/F-Verbindungen.",
          jointButton: "Zapfen erstellen",
          bmptraceNote: "Die Open-Source-Software Potrace muss lokal installiert sein.",
          bmptraceDescription: "Wandeln Sie Bilder in graustufige SVG-Ebenen für FLUX / Beam Studio Gravurtests und Leistungstabellen um.",
          bmptraceButton: "Verlauf erstellen",
          svglayersDescription: "Laden Sie eine SVG hoch, prüfen Sie Ebenennamen, schalten Sie Ebenen ein oder aus und zoomen Sie in Vektordetails.",
          svglayersButton: "Ebenen prüfen",
          controlTitle: "Parameter-Schnappschuss",
          controlDescription: "Schnelle Vorschau von Material- und Zapfenparametern; die Ausgabe wird in den einzelnen Werkzeugseiten angepasst.",
          materialThickness: "Materialstärke mm",
          kerf: "Schnittfuge mm",
          tabWidth: "Zapfenbreite mm",
          tabDepth: "Zapfentiefe mm"
        },
        "de-AT": {
          documentTitle: "3D-zu-2D-SVG-Werkzeuge",
          languageLabel: "Sprache",
          controlAria: "Vorschau der technischen Daten",
          homeTitle: "Laserwerkstatt",
          basicDescription: "Wechseln Sie zwischen Zustand ohne und mit Zapfen, um die Passung der integrierten Abwicklung zu kontrollieren.",
          basicButton: "Zapfen-Demo",
          jointDescription: "Ein SVG-Zapfenwerkzeug für Innenmaße. Laden Sie eine Abwicklung hoch, behalten Sie schwarze Linien als Innenmaß und erzeugen Sie mit grauen Materialstärke-Referenzen rechtwinklige passende f/F-Verbindungen.",
          jointButton: "Zapfen bauen",
          bmptraceNote: "Die Open-Source-Software Potrace muss lokal installiert sein.",
          bmptraceDescription: "Wandeln Sie Bilder in graustufige SVG-Ebenen für FLUX / Beam Studio Gravurtests und Leistungstabellen um.",
          bmptraceButton: "Verlauf erzeugen",
          svglayersDescription: "Laden Sie eine SVG hoch, prüfen Sie Ebenennamen, blenden Sie Ebenen ein oder aus und zoomen Sie in Vektordetails.",
          svglayersButton: "Ebenen prüfen",
          controlTitle: "Parameter-Überblick",
          controlDescription: "Schnelle Vorschau von Material- und Zapfenparametern; die Ausgabe wird in den jeweiligen Werkzeugseiten angepasst.",
          materialThickness: "Materialstärke mm",
          kerf: "Schnittfuge mm",
          tabWidth: "Zapfenbreite mm",
          tabDepth: "Zapfentiefe mm"
        }
      };

      const languageSelect = document.querySelector("#languageSelect");
      const defaultLanguage = "zh-Hant";
      const selectableLanguages = new Set(["zh-Hant", "en"]);

      function applyLanguage(language) {
        const safeLanguage = selectableLanguages.has(language) ? language : defaultLanguage;
        const dictionary = translations[safeLanguage] || translations[defaultLanguage];
        document.documentElement.lang = safeLanguage;
        document.documentElement.classList.add("notranslate");
        document.documentElement.setAttribute("translate", "no");
        document.body.setAttribute("translate", "no");
        document.title = dictionary.documentTitle;

        document.querySelectorAll("[data-i18n]").forEach((element) => {
          const key = element.dataset.i18n;
          if (dictionary[key]) element.textContent = dictionary[key];
        });

        document.querySelectorAll("[data-i18n-aria-label]").forEach((element) => {
          const key = element.dataset.i18nAriaLabel;
          if (dictionary[key]) element.setAttribute("aria-label", dictionary[key]);
        });

        languageSelect.value = safeLanguage;
        localStorage.setItem("homeLanguage", languageSelect.value);
      }

      languageSelect.addEventListener("change", (event) => {
        applyLanguage(event.target.value);
      });

      applyLanguage(localStorage.getItem("homeLanguage") || defaultLanguage);
    </script>
  </body>
</html>
