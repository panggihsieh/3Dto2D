<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SVG Layer Inspector</title>
    <link rel="stylesheet" href="styles.css?v=20260627-1">
  </head>
  <body>
    <main class="shell">
      <header class="brand">
        <h1>SVG Layer Inspector</h1>
        <span id="statusText">待載入</span>
      </header>

      <section class="layout">
        <aside class="panel side-panel">
          <div class="section-head">
            <h2>SVG 檔案</h2>
            <span id="fileMeta">未選擇</span>
          </div>
          <label class="file-field">
            <span>上傳 SVG</span>
            <input id="svgInput" type="file" accept="image/svg+xml,.svg">
          </label>
          <div class="actions">
            <button id="loadSample" type="button">載入範例</button>
            <button id="fitView" type="button">置中</button>
          </div>

          <div class="zoom-panel">
            <div class="section-head compact">
              <h2>縮放</h2>
              <span id="zoomText">100%</span>
            </div>
            <div class="zoom-row">
              <button id="zoomOut" type="button" aria-label="縮小">-</button>
              <input id="zoomRange" type="range" min="25" max="400" step="5" value="100" aria-label="縮放比例">
              <button id="zoomIn" type="button" aria-label="放大">+</button>
            </div>
          </div>
        </aside>

        <section class="workspace">
          <div class="viewer" id="viewer">
            <div class="canvas" id="canvas">
              <div class="empty-state" id="emptyState">上傳 SVG 後可檢視圖層名稱、顯示狀態與縮放</div>
              <div class="svg-stage" id="svgStage"></div>
            </div>
          </div>
        </section>

        <aside class="panel layer-panel">
          <div class="section-head">
            <h2>圖層</h2>
            <span id="layerCount">0 layers</span>
          </div>
          <div class="layer-actions">
            <button id="showAll" type="button">全部顯示</button>
            <button id="hideAll" type="button">全部隱藏</button>
          </div>
          <ol class="layer-list" id="layerList"></ol>
        </aside>
      </section>
    </main>

    <script src="app.js?v=20260627-2"></script>
  </body>
</html>
